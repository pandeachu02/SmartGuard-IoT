<!DOCTYPE html>
<html>
<head>
<title>Smart Gas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

<style>
body { font-family: Arial; text-align: center; background:#eef; }
.card { background:white; padding:20px; margin:20px auto; width:350px; border-radius:10px; }

.safe { color: green; }
.alert { color: orange; }
.danger { color: red; }

h1 { color:#1e3a8a; }
</style>
</head>

<body>

<h1>🔥 Smart Gas Dashboard</h1>

<div class="card">
<h2>Gas Value</h2>
<div id="gasValue" style="font-size:40px;">0</div>
<div>PPM</div>

<canvas id="gauge"></canvas>

<h3 id="status" class="safe">SAFE</h3>
<p id="msg">Air quality is normal</p>

<p>Last Update: <span id="time">--</span></p>
</div>

<script>

// 🔑 Blynk
const TOKEN = "kknBvWoCIihbDZx2bv258GX_P9YzN6K7";
const REAL_PIN = "V1";   // REAL value

// 🎯 Thresholds
const SAFE_LIMIT = 1500;
const ALERT_LIMIT = 2500;
const MAX_LIMIT = 4000;

// 🎯 Gauge (0–4000)
const gauge = new Gauge(document.getElementById("gauge")).setOptions({
    angle: 0.2,
    lineWidth: 0.3,
    pointer: { length: 0.6 },
    staticZones: [
        {strokeStyle: "green", min: 0, max: SAFE_LIMIT},
        {strokeStyle: "orange", min: SAFE_LIMIT, max: ALERT_LIMIT},
        {strokeStyle: "red", min: ALERT_LIMIT, max: MAX_LIMIT}
    ]
});

gauge.maxValue = MAX_LIMIT;
gauge.set(0);

// 🔄 Fetch data
async function fetchData() {
    let res = await fetch(`https://blynk.cloud/external/api/get?token=${TOKEN}&${REAL_PIN}`);
    let gas = parseInt(await res.text());

    updateUI(gas);
}

// 🎨 UI Update
function updateUI(gas) {

    document.getElementById("gasValue").innerText = gas;
    document.getElementById("time").innerText = new Date().toLocaleTimeString();

    gauge.set(gas);

    let status = document.getElementById("status");
    let msg = document.getElementById("msg");

    if (gas < SAFE_LIMIT) {
        status.innerText = "SAFE ✅";
        status.className = "safe";
        msg.innerText = "Air quality is normal 👍";

    } else if (gas < ALERT_LIMIT) {
        status.innerText = "ALERT ⚠️";
        status.className = "alert";
        msg.innerText = "Gas level rising, stay cautious 😐";

    } else {
        status.innerText = "DANGER 🚨";
        status.className = "danger";
        msg.innerText = "Gas leak detected! Take action immediately 🔥";
    }
}

// 🔁 Auto update
setInterval(fetchData, 2000);

</script>

</body>
</html>
