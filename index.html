<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Gas Gauge – Interface Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: #e0f2fe;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    main {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 {
      margin: 0 0 1rem 0;
      color: #0369a1;
      font-size: 1.6rem;
    }
    #gaugeContainer {
      width: 100%;
      height: 280px;
      margin: 1rem 0;
    }
    #status {
      font-weight: 600;
      font-size: 1.2rem;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

  <main>
    <h1>Smart Gas Gauge</h1>

    <!-- Gauge interface only -->
    <div id="gaugeContainer"></div>
    <div id="status">SAFE ✅</div>
  </main>

  <script>
    const BLYNK_TOKEN = "kknBvWoCIihbDZx2bv258GX_P9YzN6K7";
    const GAUGE_PIN   = "V0";
    const GAUGE_API   = `https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&pin=${GAUGE_PIN}`;

    const opts = {
      angle: 0.2,
      lineWidth: 0.3,
      radiusScale: 0.9,
      pointer: {
        length: 0.6,
        strokeWidth: 0.035,
        color: '#000'
      },
      limitMax: false,
      limitMin: false,
      staticZones: [
        { strokeStyle: "#16a34a", min:    0, max: 1500 }, // SAFE
        { strokeStyle: "#f59e0b", min: 1500, max: 3000 }, // WARNING
        { strokeStyle: "#ef4444", min: 3000, max: 4000 }  // DANGER
      ],
      strokeColor: '#eee',
      generateGradient: true,
      highDpiSupport: true,
      // Remove all numeric labels and ticks
      renderTicks: {
        divisions: 0,
        divWidth: 0,
        divLength: 0,
        divColor: "#000",
        subDivisions: 0
      },
      staticLabels: {
        font: "10px sans-serif",
        labels: [],   // no numbers
        color: "#000",
        fractionDigits: 0
      }
    };

    const gauge = new Gauge(document.getElementById("gaugeContainer")).setOptions(opts);
    gauge.maxValue = 4000;  // PPM scale
    gauge.setMinValue(0);
    gauge.set(0);

    async function updateGauge() {
      try {
        const response = await fetch(GAUGE_API);
        const text = await response.text();
        let gasValue = parseInt(text);

        if (isNaN(gasValue) || gasValue < 0) gasValue = 0;
        if (gasValue > 4000) gasValue = 4000;

        // Update gauge pointer only
        gauge.set(gasValue);

        // Update status text
        const statusEl = document.getElementById("status");
        if (gasValue < 1500) {
          statusEl.textContent = "SAFE ✅";
          statusEl.style.color = "#16a34a";
        } else if (gasValue < 3000) {
          statusEl.textContent = "WARNING ⚠️";
          statusEl.style.color = "#f59e0b";
        } else {
          statusEl.textContent = "DANGER ❌";
          statusEl.style.color = "#ef4444";
        }
      } catch (err) {
        console.error("Error fetching Blynk data:", err);
      }
    }

    // Update every 2 seconds
    setInterval(updateGauge, 2000);
    updateGauge();
  </script>

</body>
</html>
