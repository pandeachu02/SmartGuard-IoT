<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Gas Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; background: #f4f9ff; padding: 20px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; margin: 10px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
  .gauge { width: 200px; height: 100px; }
  #currentGas { font-size: 32px; font-weight: bold; }
  #status { font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h1>Smart Gas Dashboard</h1>

<div class="card">
  <h2>Current Gas Level</h2>
  <div id="currentGas">0</div>
  <div id="status">SAFE ✅</div>
</div>

<div class="card">
  <h2>Live Trend (Last 20 readings)</h2>
  <canvas id="gasChart" width="600" height="200"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const BLYNK_TOKEN = 'YOUR_BLYNK_TOKEN';  // Replace with your Blynk Auth Token
  const BLYNK_PIN = 'V1';                   // Virtual Pin where gas PPM is sent
  const API_URL = `https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&pin=${BLYNK_PIN}`;

  let gasData = []; // Store last 20 readings

  const ctx = document.getElementById('gasChart').getContext('2d');
  const gasChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array(20).fill(''),  // 20 empty labels
      datasets: [{
        label: 'Gas PPM',
        data: Array(20).fill(0),
        borderColor: 'blue',
        fill: false,
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      animation: false,
      scales: {
        y: { min: 0, max: 4000 },
        x: { display: false }
      }
    }
  });

  async function updateGasValue() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      const gasValue = parseInt(data[0]); // Extract value from array

      // Update current gas display
      document.getElementById('currentGas').innerText = gasValue;

      // Update status
      const statusEl = document.getElementById('status');
      if (gasValue < 1000) {
        statusEl.innerText = "SAFE ✅";
        statusEl.style.color = "green";
      } else if (gasValue < 2500) {
        statusEl.innerText = "WARNING ⚠️";
        statusEl.style.color = "orange";
      } else {
        statusEl.innerText = "DANGER ❌";
        statusEl.style.color = "red";
      }

      // Update live trend chart
      gasData.push(gasValue);
      if (gasData.length > 20) gasData.shift();
      gasChart.data.datasets[0].data = gasData;
      gasChart.update();

    } catch (error) {
      console.error('Error fetching gas data:', error);
    }
  }

  // Update every 2 seconds
  setInterval(updateGasValue, 2000);
  updateGasValue(); // Initial call
</script>

</body>
</html>
