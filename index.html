<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGuard IoT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #eaf3ff;
    text-align: center;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 { color: #1e3a8a; }

.status {
    font-size: 22px;
    font-weight: bold;
}

.safe { color: green; }
.warning { color: orange; }
.danger { color: red; }

canvas { margin-top: 20px; }
</style>
</head>

<body>

<h1>🔥 Smart Gas Dashboard</h1>

<div class="card">
    <h2>Gas Value</h2>
    <div id="gasValue" style="font-size:40px;">0</div>
    <div>PPM</div>

    <canvas id="gauge"></canvas>

    <h3 id="status" class="status safe">SAFE</h3>
    <p>Last Update: <span id="time">--</span></p>
</div>

<div class="card">
    <h2>Live Graph</h2>
    <canvas id="chart"></canvas>
</div>

<script>
// 🔑 YOUR BLYNK DETAILS
const BLYNK_TOKEN = "kknBvWoCIihbDZx2bv258GX_P9YzN6K7";
const GAS_PIN = "V0";
const ALERT_PIN = "V1";

// 📊 CHART SETUP
let chartData = {
    labels: [],
    datasets: [{
        label: "Gas Level",
        data: [],
        borderWidth: 2,
        fill: false
    }]
};

const chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: chartData
});

// 🎯 GAUGE SETUP
const gauge = new Gauge(document.getElementById("gauge")).setOptions({
    angle: 0.15,
    lineWidth: 0.3,
    pointer: { length: 0.6, strokeWidth: 0.02 },
    maxValue: 1000
});
gauge.set(0);

// 🔄 FETCH DATA FROM BLYNK
async function fetchData() {
    try {
        let gasRes = await fetch(`https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&${GAS_PIN}`);
        let gas = parseInt(await gasRes.text());

        let alertRes = await fetch(`https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&${ALERT_PIN}`);
        let alert = parseInt(await alertRes.text());

        updateUI(gas, alert);

    } catch (e) {
        console.log("Error:", e);
    }
}

// 🎨 UPDATE UI
function updateUI(gas, alert) {

    document.getElementById("gasValue").innerText = gas;
    document.getElementById("time").innerText = new Date().toLocaleTimeString();

    // Gauge scaling
    let value = Math.min(gas, 1000);
    gauge.set(value);

    // Status Logic
    let status = document.getElementById("status");

    if (alert === 1) {
        status.innerText = "DANGER 🚨";
        status.className = "status danger";
    } 
    else if (gas > 800) {
        status.innerText = "WARNING ⚠️";
        status.className = "status warning";
    } 
    else {
        status.innerText = "SAFE ✅";
        status.className = "status safe";
    }

    // Chart update
    chartData.labels.push(new Date().toLocaleTimeString());
    chartData.datasets[0].data.push(gas);

    if (chartData.labels.length > 20) {
        chartData.labels.shift();
        chartData.datasets[0].data.shift();
    }

    chart.update();
}

// ⏱ AUTO REFRESH
setInterval(fetchData, 2000);
</script>

</body>
</html>
